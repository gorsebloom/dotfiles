conky.config = {
    alignment = 'top_left',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'FFFFFF',
    default_outline_color = 'FFFFFF',
    default_shade_color = 'FFFFFF',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'DejaVu Sans Mono:size=12',
    gap_x = 60,
    gap_y = 60,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_wayland = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'normal',
    own_window_hints = 'undecorated,sticky,below,skip_taskbar,skip_pager',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 0.5,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

-- Variables: https://conky.cc/variables
conky.text = [[
${color FFFFFF}Info:$color ${scroll 48 I CAN DO ALL THINGS THROUGH CHRIST WHICH STRENGTHENETH ME!!!}
$hr
${color FFFFFF}Uptime:$color $uptime
${color FFFFFF}Frequency (in MHz):$color $freq
${color FFFFFF}Frequency (in GHz):$color $freq_g
${color FFFFFF}RAM Usage:$color $mem/$memmax - $memperc% ${membar 4}
${color FFFFFF}Swap Usage:$color $swap/$swapmax - $swapperc% ${swapbar 4}
${color FFFFFF}CPU Usage:$color $cpu% ${cpubar 4}
${color FFFFFF}Processes:$color $processes  ${color FFFFFF}Running:$color $running_processes
$hr
${color FFFFFF}File systems:
 / $color${fs_used /}/${fs_size /} ${fs_bar 6 /}
${color FFFFFF}Networking:
Up:$color ${upspeed} ${color FFFFFF} - Down:$color ${downspeed}
$hr
${color FFFFFF}Name              PID     CPU%   MEM%
${color FFFFFF} ${top name 1} ${top pid 1} ${top cpu 1} ${top mem 1}
${color FFFFFF} ${top name 2} ${top pid 2} ${top cpu 2} ${top mem 2}
${color FFFFFF} ${top name 3} ${top pid 3} ${top cpu 3} ${top mem 3}
${color FFFFFF} ${top name 4} ${top pid 4} ${top cpu 4} ${top mem 4}
]]
